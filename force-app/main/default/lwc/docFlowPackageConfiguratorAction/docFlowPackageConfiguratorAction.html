<template>
    <template if:true={isLoading}>
        <div class="loading-wrap">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <template if:false={isLoading}>
        <div class="modal-shell">
            <div class="step-header">
                <div class={stepOneClass}>1. Select Package</div>
                <div class={stepTwoClass}>2. Recipients</div>
                <div class={stepThreeClass}>3. Field Assignment</div>
            </div>

            <template if:true={isStepOne}>
                <section class="panel">
                    <div class="panel-title">Select what you want to send</div>

                    <lightning-combobox
                        label="Package"
                        value={selectedPackageId}
                        options={packageOptions}
                        onchange={handlePackageChange}>
                    </lightning-combobox>

                    <template if:true={selectedPackage}>
                        <div class="preview-box slds-m-top_medium">
                            <div><strong>Package:</strong> {selectedPackage.packageName}</div>
                            <div><strong>Templates:</strong> {selectedPackage.templates.length}</div>
                            <template for:each={selectedPackage.templates} for:item="tpl">
                                <div key={tpl.templateId}>
                                    {tpl.sortOrder}. {tpl.documentName}
                                </div>
                            </template>
                        </div>
                    </template>
                </section>
            </template>

            <template if:true={isStepTwo}>
                <section class="panel">
                    <div class="panel-title">Selected Package</div>
                    <div class="readonly-banner">{selectedPackageName}</div>
                </section>

                <div class="top-actions">
    <lightning-button-icon
        icon-name="utility:settings"
        variant="border-filled"
        alternative-text="Reminder settings"
        title="Reminder settings"
        onclick={handleToggleReminderSettings}>
    </lightning-button-icon>

    <lightning-button-icon
        icon-name="utility:add"
        variant="border-filled"
        alternative-text="Add recipient"
        title="Add recipient"
        onclick={handleAddRecipient}>
    </lightning-button-icon>

    <lightning-button-icon
        icon-name="utility:refresh"
        variant="border-filled"
        alternative-text="Reset recipients"
        title="Reset recipients"
        onclick={handleResetRecipients}>
    </lightning-button-icon>
</div>

<template if:true={showReminderSettings}>
    <section class="settings-panel">
        <div class="panel-title">Reminder Settings</div>

        <lightning-input
            type="toggle"
            label="Enable reminders"
            checked={reminderEnabled}
            onchange={handleReminderEnabledChange}>
        </lightning-input>

        <div class="recipient-grid slds-m-top_small">
            <div class="field-block">
                <lightning-combobox
                    label="Reminder interval"
                    value={reminderIntervalDays}
                    options={reminderIntervalOptions}
                    onchange={handleReminderIntervalChange}>
                </lightning-combobox>
            </div>

            <div class="field-block">
                <lightning-combobox
                    label="Maximum reminders"
                    value={reminderMaxCount}
                    options={reminderMaxOptions}
                    onchange={handleReminderMaxCountChange}>
                </lightning-combobox>
            </div>
        </div>

        <div class="recipient-note">
            These settings will be stored in draft JSON now. Reminder execution can be connected in backend next.
        </div>
    </section>
</template>

                <div class="cards-container">
                    <template for:each={recipientCards} for:item="card">
                        <section key={card.localId} class="recipient-card">
                            <button
                                class="recipient-card__header"
                                type="button"
                                data-id={card.localId}
                                onclick={handleToggleCard}>
                                <div class="recipient-card__header-left">
                                    <div class="recipient-badge">{card.sequence}</div>
                                    <div>
                                        <div class="recipient-title">Recipient {card.sequence}</div>
                                        <div class="recipient-subtitle">{card.roleLabel}</div>
                                    </div>
                                </div>

                                <div class="recipient-card__header-right">
                                    <template if:true={card.canRemove}>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare"
                                            alternative-text="Remove recipient"
                                            title="Remove recipient"
                                            data-id={card.localId}
                                            onclick={handleRemoveRecipient}>
                                        </lightning-button-icon>
                                    </template>
                                    <lightning-icon icon-name={card.expandIcon} size="x-small"></lightning-icon>
                                </div>
                            </button>

                            <template if:true={card.isExpanded}>
                                <div class="recipient-card__body">
                                    <div class="recipient-grid">
                                        <div class="field-block">
                                            <div class="field-mode-row">
                                                <div class="field-title"><span class="required">*</span> Name</div>
                                                <div class="mode-toggle">
                                                    <span class="mode-label">Use field</span>
                                                    <lightning-input
                                                        variant="label-hidden"
                                                        type="toggle"
                                                        checked={card.nameModeIsField}
                                                        data-id={card.localId}
                                                        data-section="name"
                                                        onchange={handleModeToggle}>
                                                    </lightning-input>
                                                </div>
                                            </div>

                                            <template if:true={card.nameModeIsField}>
                                                <lightning-combobox
                                                    label="Name field"
                                                    value={card.nameFieldApi}
                                                    options={nameFieldOptions}
                                                    data-id={card.localId}
                                                    data-section="name"
                                                    onchange={handleFieldSelectionChange}>
                                                </lightning-combobox>
                                            </template>

                                            <template if:false={card.nameModeIsField}>
                                                <lightning-input
                                                    type="text"
                                                    label="Name"
                                                    value={card.nameManualValue}
                                                    data-id={card.localId}
                                                    data-section="name"
                                                    onchange={handleManualInputChange}>
                                                </lightning-input>
                                            </template>
                                        </div>

                                        <div class="field-block">
                                            <div class="field-title no-toggle">Role</div>
                                            <lightning-combobox
                                                label="Role"
                                                value={card.role}
                                                options={roleOptions}
                                                data-id={card.localId}
                                                onchange={handleRoleChange}>
                                            </lightning-combobox>
                                        </div>

                                        <div class="field-block">
                                            <div class="field-mode-row">
                                                <div class="field-title">Email</div>
                                                <div class="mode-toggle">
                                                    <span class="mode-label">Use field</span>
                                                    <lightning-input
                                                        variant="label-hidden"
                                                        type="toggle"
                                                        checked={card.emailModeIsField}
                                                        data-id={card.localId}
                                                        data-section="email"
                                                        onchange={handleModeToggle}>
                                                    </lightning-input>
                                                </div>
                                            </div>

                                            <template if:true={card.emailModeIsField}>
                                                <lightning-combobox
                                                    label="Email field"
                                                    value={card.emailFieldApi}
                                                    options={emailFieldOptions}
                                                    data-id={card.localId}
                                                    data-section="email"
                                                    onchange={handleFieldSelectionChange}>
                                                </lightning-combobox>
                                            </template>

                                            <template if:false={card.emailModeIsField}>
                                                <lightning-input
                                                    type="email"
                                                    label="Email"
                                                    value={card.emailManualValue}
                                                    data-id={card.localId}
                                                    data-section="email"
                                                    onchange={handleManualInputChange}>
                                                </lightning-input>
                                            </template>
                                        </div>

                                        <div class="field-block">
                                            <div class="field-mode-row">
                                                <div class="field-title">SMS</div>
                                                <div class="mode-toggle">
                                                    <span class="mode-label">Use field</span>
                                                    <lightning-input
                                                        variant="label-hidden"
                                                        type="toggle"
                                                        checked={card.phoneModeIsField}
                                                        data-id={card.localId}
                                                        data-section="phone"
                                                        onchange={handleModeToggle}>
                                                    </lightning-input>
                                                </div>
                                            </div>

                                            <template if:true={card.phoneModeIsField}>
                                                <lightning-combobox
                                                    label="Phone field"
                                                    value={card.phoneFieldApi}
                                                    options={phoneFieldOptions}
                                                    data-id={card.localId}
                                                    data-section="phone"
                                                    onchange={handleFieldSelectionChange}>
                                                </lightning-combobox>
                                            </template>

                                            <template if:false={card.phoneModeIsField}>
                                                <lightning-input
                                                    type="tel"
                                                    label="Phone"
                                                    field-level-help="At least one of email or phone is required. Phone accepts 7 to 15 digits."
                                                    value={card.phoneManualValue}
                                                    data-id={card.localId}
                                                    data-section="phone"
                                                    onchange={handleManualInputChange}>
                                                </lightning-input>
                                            </template>
                                        </div>
                                    </div>

                                    <div class="recipient-note">
                                        At least one of email or phone is required for each recipient.
                                    </div>
                                </div>
                            </template>
                        </section>
                    </template>
                </div>

                <section class="from-address-panel">
                    <div class="from-address-title">From Address</div>

                    <lightning-combobox
                        class="slds-m-top_small"
                        label="Select from address"
                        value={selectedFromAddressValue}
                        options={fromAddressOptions}
                        onchange={handleFromAddressChange}>
                    </lightning-combobox>

                    <template if:true={selectedFromAddressOption}>
                        <div class="preview-box slds-m-top_small">
                            <div><strong>Name:</strong> {selectedFromAddressOption.label}</div>
                            <div><strong>Email:</strong> {selectedFromAddressOption.email}</div>
                        </div>
                    </template>
                </section>
            </template>

            <template if:true={isStepThree}>
                <section class="panel">
                    <div class="panel-title">Field Assignment</div>
                    <div class="readonly-banner">{selectedPackageName}</div>
                    <div class="assignment-note">
                        Interactive fields and merge fields are both shown here. Merge field assignment will be stored in draft JSON for the next backend step.
                    </div>
                </section>

                <div class="assignment-container">
                    <template for:each={assignmentRows} for:item="row">
                        <section key={row.key} class="assignment-row">
                            <div class="assignment-meta">
                                <div class="assignment-doc">{row.documentName}</div>
                                <div class="assignment-field">
                                    {row.fieldName} · {row.fieldType}

                                    <template if:true={row.isMerge}>
                                        <span class="merge-tag">Merge</span>
                                    </template>

                                    <template if:false={row.isMerge}>
                                        <template if:true={row.required}>
                                            <span class="required-tag">Required</span>
                                        </template>
                                    </template>
                                </div>

                                <template if:true={row.isMerge}>
                                    <div class="assignment-merge-source">
                                        Source: {row.mergeSourceLabel}
                                    </div>
                                </template>
                            </div>

                            <lightning-combobox
                                label="Assign to"
                                value={row.recipientId}
                                options={assignmentRecipientOptions}
                                data-key={row.key}
                                onchange={handleAssignmentChange}>
                            </lightning-combobox>
                        </section>
                    </template>
                </div>
            </template>

            <div class="footer-actions">
                <template if:true={isStepOne}>
                    <lightning-button
                        label="Cancel"
                        onclick={handleCancel}
                        disabled={isSaving}>
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Next"
                        onclick={handleNextFromStepOne}
                        disabled={isSaving}>
                    </lightning-button>
                </template>

                <template if:true={isStepTwo}>
                    <lightning-button
                        label="Back"
                        onclick={handleBackToStepOne}
                        disabled={isSaving}>
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Next"
                        onclick={handleNextFromStepTwo}
                        disabled={isSaving}>
                    </lightning-button>
                </template>

                <template if:true={isStepThree}>
                    <lightning-button
                        label="Back"
                        onclick={handleBackToStepTwo}
                        disabled={isSaving}>
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Initiate Request"
                        onclick={handleSaveDraft}
                        disabled={isSaving}>
                    </lightning-button>
                </template>
            </div>

            <template if:true={isSaving}>
                <div class="saving-row">
                    <lightning-spinner alternative-text="Saving" size="small"></lightning-spinner>
                </div>
            </template>
        </div>
    </template>
</template>
