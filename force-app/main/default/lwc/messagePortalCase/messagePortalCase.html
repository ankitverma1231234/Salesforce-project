<template>
    <lightning-card class="portal-card">

        <!-- Spinner Overlay -->
        <template if:true={isLoading}>
            <div class="spinner-backdrop">
                <lightning-spinner alternative-text="Processing" size="medium">
                </lightning-spinner>
            </div>
        </template>

        <div class="slds-p-around_large">

            <!-- Header -->
            <div class="header-section slds-m-bottom_large">

                <div class="header-title">
                    Message Member Portal
                </div>
            </div>

            <!-- Account / Contact -->
            <div class="section-box">
                <lightning-input
                    label="Account Name"
                    value={accountName}
                    disabled>
                </lightning-input>

                <lightning-input
                    label="Contact Name"
                    value={contactName}
                    disabled
                    required>
                </lightning-input>
            </div>

            <!-- Message Section -->
            <div class="section-box slds-m-top_medium">
                <lightning-input
                    label="Subject"
                    value={subject}
                    onchange={handleSubjectChange}
                    disabled={isLoading}
                    >
                </lightning-input>

                <lightning-textarea
                    label="Message"
                    value={message}
                    onchange={handleMessageChange}
                    disabled={isLoading}
                    >
                </lightning-textarea>
            </div>

            <!-- File Upload -->
            <div class="section-box slds-m-top_medium">
                <lightning-file-upload
                    label="Upload Files"
                    record-id={recordId}
                    multiple
                    disabled={isLoading}
                    onuploadfinished={handleUploadFinished}>
                </lightning-file-upload>

                <template if:true={uploadedFiles.length}>
                    <div class="uploaded-files slds-m-top_small">
                        <template for:each={uploadedFiles} for:item="file">
                            <div key={file.documentId} class="file-pill">
                                <lightning-icon
                                    icon-name="doctype:attachment"
                                    size="x-small">
                                </lightning-icon>
                                <span>{file.name}</span>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Footer -->
            <div class="footer-actions slds-m-top_large">
                <lightning-button
                    label="Submit"
                    variant="brand"
                    onclick={handleCreateCase}
                    disabled={isLoading}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
